description: "Lab VM connections"
session: lab
directory: "~"
windows:
  - name: remotes
    layout: tiled
    panes:
      - title: kali
        command: ssh bb-kali-static
      - title: ubuntu
        split: v
        command: ssh bb-ubuntu-static
      - title: ubuntu-24
        split: v
        command: ssh bb-Ubuntu24-04-test
      - title: rhel-9
        split: v
        command: ssh bb-RH9-Test
