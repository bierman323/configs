# Chrome Pinned Tab URLs
# One URL (or URL prefix) per line.
# Tabs whose URL starts with any line here will be skipped by gtd-chrome.sh.
# Lines starting with # are comments.
#
# Example:
# https://mail.google.com
# https://calendar.google.com
# https://jira.example.com/software
#
# Add your pinned tab URLs below:
http://localhost:3000/
http://localhost:5000/
# Work-specific pinned URLs are in chrome-pinned-urls_sensitive.conf (git-ignored)
