# Chrome Domain Mapping Configuration
# Used by gtd-chrome.sh for type hinting and category tagging
#
# Format: domain_pattern|type|category
# type: action, reference, read-later
# category: dev, security, docs, shopping, finance, news, social, tools, media, personal
#
# domain_pattern supports:
#   - exact match: github.com
#   - wildcard prefix: *.docs.aws.amazon.com
#   - any subdomain: docs.* (matches docs.anything.com)
#
# Lines starting with # are comments. Blank lines are ignored.
# Default type for unmatched domains: action

